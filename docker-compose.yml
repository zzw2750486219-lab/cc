version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
      - SANDBOX_MODE=${SANDBOX_MODE:-inline}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
